name: Update HUD Profile Card

permissions:
  contents: write

on:
  schedule:

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate card
        env:
          GH_USERNAME: ghozt-zx
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_card.py

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-card.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: refresh HUD stats card"
          git push
