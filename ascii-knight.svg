<svg width="900" height="1200"
     viewBox="0 0 900 1200"
     xmlns="http://www.w3.org/2000/svg">

    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="100%" height="100%" fill="#070c0b"/>

    <text
        x="450"
        y="80"
        text-anchor="middle"
        font-family="Consolas, monospace"
        font-size="12"
        fill="#8ffcd0"
        filter="url(#glow)"
        xml:space="preserve">

<tspan x="450" dy="0">⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀</tspan>
<tspan x="450" dy="16">⠀⠀⠀⠀⠀⠀⠀⠖⠃⠐⠀⠀⡁⠀⠀⠀⠀⠀⠐⠆</tspan>
<tspan x="450" dy="16">⠀⠀⠀⠀⠀⠀⠀⠀⠘⠁⢀⠄⠀⠀⠀⢈⠓⠂⠠⡄</tspan>
<tspan x="450" dy="16">...</tspan>

        <animate
            attributeName="opacity"
            values="1;1;0.6;1;0.85;1"
            dur="2.8s"
            repeatCount="indefinite"/>
    </text>

</svg>
